name: opentune
description: Cliente de YouTube Music para Android e iOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.11
  audio_session: ^0.1.18
  http: ^1.1.0
  dio: ^5.4.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.3
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  permission_handler: ^11.2.0
  connectivity_plus: ^5.0.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true